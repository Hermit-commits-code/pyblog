site_name: PyBlog
site_description: A lightweight developer blog
site_url: https://Hermit-commits-code.github.io/pyblog
repo_url: https://github.com/Hermit-commits-code/pyblog
use_directory_urls: true
plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: true
  - rss:
      limit: 20
      description: "PyBlog posts"
nav:
  - Home: index.md
  - Posts:
      - "First Post": posts/first-post.md
  - Zero-Knowledge Journal: zk-journal.md
theme:
  name: material
  palette:
    primary: indigo
    accent: teal
extra_css:
  - assets/stylesheets/extra.css
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Hermit-commits-code/pyblog
markdown_extensions:
  - admonition
  - toc:
      permalink: true
