<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <title>PR Status</title>
  <script>
    const pr = {{ pr_number }};
    async function poll() {
      const res = await fetch(`/admin/pr_status?pr_number=${pr}`);
      const data = await res.json();
      console.log(data);
      if (data.merged) {
        document.getElementById('status').innerText = 'Merged ✅';
        if (Notification && Notification.permission === 'granted') {
          new Notification('PR merged', { body: 'Your post was merged.' });
        }
        return;
      }
      const state = data.combined_state || data.state || 'pending';
      document.getElementById('status').innerText = state;
      setTimeout(poll, 8000);
    }
    document.addEventListener('DOMContentLoaded', () => {
      if (Notification && Notification.permission !== 'granted') Notification.requestPermission();
      poll();
    });
  </script>
</head>

<body>
  <h1>PR Status</h1>
  <p>PR: <a href="{{ pr_url }}">{{ pr_title }}</a></p>
  <p id="status">Checking...</p>
</body>

</html>
