<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <title>New Post — Admin</title>
</head>

<body>
  <h1>New Post</h1>
  {% if token %}
  <p>GitHub credentials available.</p>
  {% else %}
  <p>No GitHub credentials. <a href="/auth/login">Login with GitHub</a></p>
  {% endif %}
  <form method="post" enctype="multipart/form-data" action="/admin/new">
    <label>Title: <input name="title" /></label><br />
    <label>Tags (comma): <input name="tags" /></label><br />
    <label>Image: <input type="file" name="image" /></label><br />
    <label>Content:<br />
      <textarea name="content" rows="20" cols="80"></textarea>
    </label><br />
    <button type="submit">Create PR</button>
  </form>
  <p>Repo: {{ repo }}</p>
</body>

</html>
