name: Release

on:
    workflow_dispatch:
        inputs:
            version:
                description: "Version to release (e.g. 0.1.0)"
                required: true

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  persist-credentials: true

            - name: Setup Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.11"

            - name: Install Poetry
              run: python -m pip install --upgrade pip poetry

            - name: Install dependencies
              run: poetry install --no-interaction

            - name: Build changelog with Towncrier
              run: |
                  poetry run towncrier build --yes --version ${{ github.event.inputs.version }}

            - name: Commit changelog and push
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add CHANGELOG.md || true
                  git commit -m "chore(release): v${{ github.event.inputs.version }}" || echo "no changes"
                  git tag -a "v${{ github.event.inputs.version }}" -m "v${{ github.event.inputs.version }}" || echo "tag exists"
                  git push origin --tags || echo "push failed"

            - name: Create GitHub Release
              uses: actions/create-release@v1
              with:
                  tag_name: v${{ github.event.inputs.version }}
                  release_name: v${{ github.event.inputs.version }}
                  body_path: CHANGELOG.md
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
