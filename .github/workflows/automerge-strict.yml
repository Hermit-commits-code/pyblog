name: Automerge (strict)

on:
    pull_request:
        types: [labeled, synchronize, opened]

jobs:
    automerge:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
            checks: read
        steps:
            - name: Check automerge label and author allowlist
              uses: actions/github-script@v7
              id: check
              with:
                  script: |
                      const pr = context.payload.pull_request || (await github.rest.pulls.get({owner: context.repo.owner, repo: context.repo.repo, pull_number: context.payload.pull_request.number})).data
                      const labels = pr.labels.map(l=>l.name)
                      const want = process.env.ADMIN_AUTOMERGE_LABEL || 'automerge-admin'
                      if (!labels.includes(want)) {
                        core.setOutput('skip', 'label-missing')
                        return
                      }
                      const allowed = (process.env.AUTOMERGE_ALLOWED_AUTHORS || '').split(',').map(s=>s.trim()).filter(Boolean)
                      if (allowed.length && !allowed.includes(pr.user.login)) {
                        core.setOutput('skip', 'author-not-allowed')
                        return
                      }
                      core.setOutput('skip', '')

            - name: Determine head sha
              if: steps.check.outputs.skip == ''
              uses: actions/github-script@v7
              id: status
              with:
                  script: |
                      const pr = context.payload.pull_request || (await github.rest.pulls.get({owner: context.repo.owner, repo: context.repo.repo, pull_number: context.payload.pull_request.number})).data
                      return pr.head.sha

            - name: Wait for checks to be successful
              if: steps.check.outputs.skip == ''
              uses: actions/github-script@v7
              with:
                  script: |
                      const sha = await github.action.getInput('sha') || (await steps.status.outputs.result)
                      const target = sha
                      const sleep = ms => new Promise(r=>setTimeout(r, ms))
                      for (let i=0;i<60;i++){
                        const status = await github.rest.repos.getCombinedStatusForRef({owner: context.repo.owner, repo: context.repo.repo, ref: target})
                        if (status.data.state === 'success') return
                        const checks = await github.rest.checks.listForRef({owner: context.repo.owner, repo: context.repo.repo, ref: target})
                        if (checks.data.check_runs.length && checks.data.check_runs.every(c=>c.conclusion === 'success')) return
                        await sleep(15*1000)
                      }
                      throw new Error('Checks did not complete successfully in time')

            - name: Merge PR
              if: steps.check.outputs.skip == ''
              uses: actions/github-script@v7
              with:
                  script: |
                      const pr_number = context.payload.pull_request.number
                      await github.rest.pulls.merge({owner: context.repo.owner, repo: context.repo.repo, pull_number: pr_number, merge_method: 'squash'})

            - name: Skip notice
              if: steps.check.outputs.skip != ''
              run: |
                  echo "Automerge skipped: ${{ steps.check.outputs.skip }}"
