name: CI Full

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/poetry.lock', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Poetry
        run: python -m pip install --upgrade pip poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run pre-commit hooks
        run: poetry run pre-commit run --all-files

      - name: Run tests (skip if no tests)
        run: |
          if git ls-files --error-unmatch 'tests/**' >/dev/null 2>&1 \
             || git ls-files --error-unmatch 'test_*.py' >/dev/null 2>&1 \
             || git ls-files --error-unmatch '*_test.py' >/dev/null 2>&1; then
            poetry run pytest -q --junitxml=pytest-results.xml || true
          else
            echo "No tests found — skipping pytest"
          fi

      - name: Upload pytest results (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: pytest-results.xml

      - name: pip-audit (non-blocking)
        run: |
          poetry run pip-audit --format=json > audit.json || true

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit
          path: audit.json
